<!-- Mobile Menu Button - visible only on small screens -->
<button class="md:hidden fixed bottom-6 right-6 z-50 p-4 bg-slate-900 text-white rounded-full shadow-lg"
    (click)="toggleMobileMenu()">
    @if (isMobileOpen) {
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
    } @else {
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
    }
</button>

<!-- Overlay for mobile -->
@if (isMobileOpen) {
<div class="md:hidden fixed inset-0 bg-slate-900/20 z-30 pointer-events-auto transition-opacity" (click)="closeMenu()">
</div>
}

<!-- Sidebar definition -->
<aside
    class="fixed md:sticky top-0 left-0 z-40 h-screen transition-all duration-300 ease-in-out bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col md:translate-x-0"
    [class.w-64]="!isCollapsed"
    [class.w-20]="isCollapsed"
    [class.translate-x-0]="isMobileOpen"
    [class.overflow-y-auto]="isMobileOpen"
    [class.-translate-x-full]="!isMobileOpen"
    [class.overflow-hidden]="!isMobileOpen">
    
    <!-- Logo context -->
    <div class="flex h-16 items-center border-b border-slate-200 dark:border-slate-800 px-6 shrink-0 transition-all duration-300"
        [class.px-6]="!isCollapsed"
        [class.px-4]="isCollapsed"
        [class.justify-center]="isCollapsed">
        <a routerLink="/dashboard" class="flex items-center gap-2 overflow-hidden" (click)="closeMenu()">
            <div class="flex h-8 w-8 min-w-[32px] items-center justify-center rounded-lg bg-slate-900 dark:bg-slate-800 text-white font-bold text-lg">M
            </div>
            <span class="text-xl font-semibold tracking-tight text-slate-900 dark:text-white transition-opacity duration-300 whitespace-nowrap"
                [class.opacity-0]="isCollapsed"
                [class.w-0]="isCollapsed">Meta Flow</span>
        </a>
    </div>

    <!-- Links Navigation -->
    <div class="flex-1 overflow-y-auto py-6 px-4 transition-all duration-300"
        [class.px-4]="!isCollapsed"
        [class.px-3]="isCollapsed">
        <nav class="space-y-1">
            @for (link of links; track link.name) {
            <a [routerLink]="link.href" routerLinkActive="bg-slate-50 text-slate-900 !text-slate-900 dark:bg-slate-800 dark:text-white dark:!text-white"
                [routerLinkActiveOptions]="{exact: link.href === '/dashboard'}" #rla="routerLinkActive"
                (click)="closeMenu()"
                [title]="isCollapsed ? link.name : ''"
                class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white relative overflow-hidden"
                [class.bg-slate-50]="rla.isActive"
                [class.dark:bg-slate-800]="rla.isActive"
                [class.justify-center]="isCollapsed">
                @if (rla.isActive) {
                <span class="absolute left-0 top-1/2 -translate-y-1/2 h-5 w-1 rounded-r-full bg-slate-900 dark:bg-primary"></span>
                }
                <div class="shrink-0 transition-transform duration-300" 
                    [class.text-slate-900]="rla.isActive" 
                    [class.dark:text-white]="rla.isActive" 
                    [class.text-slate-400]="!rla.isActive"
                    [innerHTML]="link.icon"></div>
                
                <span class="transition-all duration-300 whitespace-nowrap"
                    [class.opacity-0]="isCollapsed"
                    [class.w-0]="isCollapsed"
                    [class.translate-x-10]="isCollapsed">
                    {{link.name}}
                </span>
            </a>
            }
        </nav>
    </div>

    <!-- Toggle Button (Desktop Only) -->
    <div class="hidden md:flex p-4 border-t border-slate-200 dark:border-slate-800">
        <button (click)="toggleCollapse()" 
            class="flex items-center justify-center w-full h-10 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
            [title]="isCollapsed ? 'Expandir' : 'Recolher'">
            <svg class="w-5 h-5 transition-transform duration-300" 
                [class.rotate-180]="isCollapsed"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span class="ml-2 text-sm font-medium transition-all duration-300 whitespace-nowrap overflow-hidden"
                [class.w-0]="isCollapsed"
                [class.opacity-0]="isCollapsed">
                Recolher
            </span>
        </button>
    </div>
</aside>
