<header
    class="sticky top-0 z-30 flex h-16 shrink-0 items-center justify-between border-b border-slate-200 bg-white/80 backdrop-blur-md px-6 shadow-sm">
    <div class="flex flex-1 gap-x-4 lg:gap-x-6">
        <div class="flex justify-end flex-1">
            <div class="flex items-center gap-x-4 lg:gap-x-6 relative">
                <!-- User Profile Dropdown Trigger -->
                <button (click)="toggleDropdown()" class="flex items-center gap-2 group focus:outline-none">
                    <span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">
                        Olá, {{ userName() }}
                    </span>
                    <svg class="h-4 w-4 text-slate-400 group-hover:text-slate-600 transition-colors"
                        [class.rotate-180]="isDropdownOpen()" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>

                <!-- Dropdown Menu -->
                @if (isDropdownOpen()) {
                <div class="absolute right-0 top-10 w-48 bg-white border border-slate-200 rounded-xl shadow-lg py-2 animate-in fade-in zoom-in-95 duration-200"
                    (click)="$event.stopPropagation()">
                    <button (click)="logout()"
                        class="flex w-full items-center gap-3 px-4 py-2 text-sm text-slate-600 hover:bg-red-50 hover:text-red-600 transition-colors group">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-red-500" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Sair
                    </button>
                </div>

                <!-- Invisible overlay to close dropdown when clicking outside -->
                <div class="fixed inset-0 z-[-1]" (click)="closeDropdown()"></div>
                }
            </div>
        </div>
    </div>
</header>
