<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-full">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-base font-bold text-slate-900">Marcos de Evolução</h3>
        <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-1 rounded">
            {{ unlockedList.length }} / {{ ALL_MILESTONES.length }}
        </span>
    </div>

    <div class="flex flex-col gap-3">
        @for (milestone of ALL_MILESTONES; track milestone.id) {
        <div class="flex items-center gap-4 p-3 rounded-lg border transition-all"
            [ngClass]="isUnlocked(milestone.id) ? 'bg-blue-50/50 border-blue-200' : 'bg-slate-50 border-slate-100 opacity-60 grayscale'">
            <div class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center border-2"
                [ngClass]="isUnlocked(milestone.id) ? 'bg-blue-100 border-blue-300 text-blue-600' : 'bg-slate-200 border-slate-300 text-slate-400'">
                @if (isUnlocked(milestone.id)) {
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                } @else {
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                }
            </div>

            <div>
                <div class="text-sm font-bold"
                    [ngClass]="isUnlocked(milestone.id) ? 'text-slate-900' : 'text-slate-700'">
                    {{ milestone.title }}
                </div>
                <div class="text-xs" [ngClass]="isUnlocked(milestone.id) ? 'text-slate-600' : 'text-slate-500'">
                    {{ milestone.desc }}
                </div>
            </div>
        </div>
        }
    </div>
</div>
