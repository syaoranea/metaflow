<div (click)="viewDetails()"
    class="group flex flex-col h-full rounded-2xl bg-white p-6 shadow-sm transition-all duration-300 hover:shadow-md border border-slate-200 cursor-pointer hover:border-slate-300">
    <div class="flex items-start justify-between gap-4 mb-4">
        <div class="flex-1 min-w-0">
            <h3 class="text-lg font-bold text-slate-900 truncate group-hover:text-emerald-600 transition-colors"
                [title]="goal?.title">
                {{ goal?.title }}
            </h3>
        </div>
    </div>

    <!-- Spacing to push bottom content down -->
    <div class="flex-1 mb-6"></div>

    <div class="mb-6">
        <!-- Inline ProgressBar implementation -->
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-slate-700">Progresso</span>
            <span class="text-sm font-bold text-slate-900">{{ Math.round(goal?.progress || 0) }}%</span>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
            <div class="bg-slate-900 h-2.5 rounded-full transition-all duration-500 ease-out"
                [style.width]="(goal?.progress || 0) + '%'">
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-slate-100 mt-auto">
        <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            {{ goal?.created_at | date:'shortDate' }}
        </div>

        <div class="text-sm font-semibold text-slate-400 group-hover:text-emerald-600 transition-colors">
            Editar →
        </div>
    </div>
</div>
