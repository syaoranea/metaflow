<div (click)="onEdit.emit(goal.sk)"
    class="group flex flex-col h-full rounded-2xl bg-white dark:bg-slate-900 p-6 shadow-sm transition-all duration-300 hover:shadow-md border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-slate-300 dark:hover:border-slate-700">
    <!-- ... (rest of card content unchanged) -->
    <div class="flex items-start justify-between gap-4 mb-4">
        <div class="flex-1 min-w-0">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white truncate group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors"
                [title]="goal.title">
                {{ goal.title }}
            </h3>
        </div>
        @if (isFinancesGoal) {
        <button (click)="openFinanceApp($event)"
            class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-600 text-white text-xs font-bold shadow-sm hover:bg-emerald-700 transition-all hover:scale-105 active:scale-95">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            App Finanças
        </button>
        }
    </div>

    <div class="flex-1 mb-6"></div>

    <div class="mb-6">
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Progresso</span>
            <span class="text-sm font-bold text-slate-900 dark:text-white">{{ Math.round(calculatedProgress) }}%</span>
        </div>
        <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2.5 overflow-hidden">
            <div class="bg-slate-900 dark:bg-primary h-2.5 rounded-full transition-all duration-500 ease-out"
                [style.width]="calculatedProgress + '%'">
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-800 mt-auto">
        <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500 dark:text-slate-400">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            @if (goal.deadline) {
            Prazo: {{ goal.deadline | date:'shortDate' }}
            } @else {
            {{ goal.created_at | date:'shortDate' }}
            }
        </div>

        <div (click)="viewDetails($event)"
            class="text-sm font-semibold text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors px-2 py-1 rounded-lg hover:bg-emerald-50 dark:hover:bg-emerald-950/30">
            Ver detalhes →
        </div>
    </div>
</div>
