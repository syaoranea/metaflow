@if (isOpen) {
<div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden animate-in zoom-in-95 duration-200 fill-mode-both"
        (click)="$event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-slate-900">
                {{ goalToEdit ? 'Editar Meta' : 'Nova Meta' }}
            </h2>
            <button (click)="close()" class="text-slate-400 hover:text-slate-900 p-1 rounded-md transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <form [formGroup]="goalForm" (ngSubmit)="submit()" class="p-6">
            <div class="space-y-4">
                <div>
                    <label for="title" class="block text-sm font-medium text-slate-700 mb-1">
                        Título da meta *
                    </label>
                    <input id="title" type="text" autofocus formControlName="title"
                        placeholder="Ex: Melhorar minha saúde"
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm" />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="category" class="block text-sm font-medium text-slate-700 mb-1">
                            Categoria *
                        </label>
                        <select id="category" formControlName="category"
                            class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm bg-white">
                            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                        </select>
                    </div>

                    <div>
                        <label for="deadline" class="block text-sm font-medium text-slate-700 mb-1">
                            Prazo
                        </label>
                        <input id="deadline" type="date" formControlName="deadline"
                            class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm" />
                    </div>
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1">
                        Descrição
                    </label>
                    <textarea id="description" formControlName="description" rows="3"
                        placeholder="Detalhes sobre sua meta..."
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm"></textarea>
                </div>

                <div>
                    <label for="progress" class="block text-sm font-medium text-slate-700 mb-1">
                        Progresso Atual (%)
                    </label>
                    <input id="progress" type="number" formControlName="progress" min="0" max="100"
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm" />
                </div>
            </div>

            <div class="mt-8 flex items-center justify-between gap-3 pt-4 border-t border-slate-100">
                <div class="flex items-center gap-3">
                    @if (goalToEdit) {
                    <app-button variant="secondary" type="button" (click)="delete()" [disabled]="isLoading"
                        customClass="text-red-600 hover:bg-red-50 hover:border-red-100">
                        Remover
                    </app-button>
                    }
                    <app-button variant="secondary" type="button" (click)="close()" [disabled]="isLoading">
                        Cancelar
                    </app-button>
                </div>

                <app-button variant="primary" type="submit" [disabled]="isLoading || goalForm.invalid"
                    customClass="min-w-[120px]">
                    @if (isLoading) {
                    <div class="flex justify-center items-center h-5 w-5">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                    } @else {
                    {{ goalToEdit ? 'Salvar Alterações' : 'Criar Meta' }}
                    }
                </app-button>
            </div>
        </form>
    </div>
</div>
}
