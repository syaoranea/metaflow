@if (isOpen) {
<div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden animate-in zoom-in-95 duration-200 fill-mode-both"
        (click)="$event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
            <h2 class="text-lg font-bold text-slate-900">Nova Meta</h2>
            <button (click)="close()" class="text-slate-400 hover:text-slate-900 p-1 rounded-md transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <form [formGroup]="goalForm" (ngSubmit)="submit()" class="p-6">
            <div class="space-y-4">
                <div>
                    <label for="title" class="block text-sm font-medium text-slate-700 mb-1">
                        Título da meta *
                    </label>
                    <input id="title" type="text" autofocus formControlName="title"
                        placeholder="Ex: Melhorar minha saúde"
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm" />
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1">
                        Descrição <span class="text-slate-400 font-normal">(Opcional)</span>
                    </label>
                    <textarea id="description" rows="3" formControlName="description"
                        placeholder="Detalhes adicionais sobre como atingir essa meta..."
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm resize-none"></textarea>
                </div>

                <div>
                    <label for="deadline" class="block text-sm font-medium text-slate-700 mb-1">
                        Prazo <span class="text-slate-400 font-normal">(Opcional)</span>
                    </label>
                    <input id="deadline" type="date" formControlName="deadline"
                        class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm" />
                </div>

                <div class="pt-2">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input type="checkbox" formControlName="isPrimary"
                                class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 transition-all checked:border-slate-900 checked:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2" />
                            <div
                                class="pointer-events-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white opacity-0 transition-opacity peer-checked:opacity-100">
                                <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor" stroke="currentColor"
                                    stroke-width="1">
                                    <path fill-rule="evenodd"
                                        d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                        clip-rule="evenodd" />
                                </svg>
                            </div>
                        </div>
                        <div>
                            <span class="text-sm font-medium text-slate-900 block">Definir como Meta Principal</span>
                            <span class="text-xs text-slate-500 block">Isso dará destaque a esta meta no
                                Dashboard.</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-8 flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                <app-button variant="secondary" type="button" (click)="close()" [disabled]="isLoading">
                    Cancelar
                </app-button>

                <app-button variant="primary" type="submit" [disabled]="isLoading || goalForm.invalid"
                    customClass="min-w-[120px]">
                    @if (isLoading) {
                    <div class="flex justify-center items-center h-5 w-5">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                    } @else {
                    Criar Meta
                    }
                </app-button>
            </div>
        </form>
    </div>
</div>
}
