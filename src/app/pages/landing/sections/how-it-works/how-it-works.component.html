<section id="como-funciona" class="bg-slate-50 py-24 sm:py-32 border-t border-slate-100">
    <div class="mx-auto max-w-6xl px-6">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl text-balance">
                Como o Meta Flow funciona
            </h2>
        </div>

        <div class="grid md:grid-cols-3 gap-12 max-w-5xl mx-auto">
            @for (step of steps; track step.title; let idx = $index; let isLast = $last) {
            <div class="relative flex flex-col items-center md:items-start text-center md:text-left">
                @if (!isLast) {
                <div class="hidden md:block absolute top-6 left-16 right-0 h-[1px] bg-slate-200 w-[calc(100%-2rem)]">
                </div>
                }
                <div
                    class="relative z-10 flex h-12 w-12 items-center justify-center rounded-xl border border-slate-200 bg-white text-lg font-bold text-slate-900 shadow-sm mb-6">
                    {{ step.number }}
                </div>
                <h3 class="text-xl font-semibold text-slate-900 mb-3">{{ step.title }}</h3>
                <p class="text-slate-600 leading-relaxed">
                    {{ step.desc }}
                </p>
            </div>
            }
        </div>
    </div>
</section>
