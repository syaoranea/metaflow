<div class="min-h-screen flex flex-col bg-slate-50 selection:bg-emerald-100 selection:text-emerald-900">
    <header class="p-6">
        <div class="max-w-6xl mx-auto flex items-center gap-2">
            <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-slate-900 text-white font-bold text-lg">M
            </div>
            <a routerLink="/"
                class="text-xl font-semibold tracking-tight text-slate-900 hover:opacity-80 transition-opacity">Meta
                Flow</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-12 md:py-24 w-full">
        <div class="w-full relative">
            <div
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-slate-200/40 rounded-full blur-3xl opacity-50 pointer-events-none -z-10">
            </div>

            <div class="animate-in fade-in zoom-in-95 duration-300 w-full max-w-md mx-auto relative pt-4 pb-2">
                <div class="bg-white shadow-sm border border-slate-200 rounded-2xl relative overflow-hidden">
                    <div class="px-6 py-8 sm:px-10 sm:py-10">
                        <h2 class="text-2xl font-bold text-slate-900 mb-2">Entrar no Meta Flow</h2>
                        <p class="text-slate-500 mb-8">Acesse sua estrutura de evolução.</p>

                        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
                            <div>
                                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                                <input id="email" type="email" formControlName="email" placeholder="seu@email.com"
                                    class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm">
                            </div>

                            <div>
                                <label for="password"
                                    class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                                <input id="password" type="password" formControlName="password" placeholder="••••••••"
                                    class="block w-full rounded-lg border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-slate-900 sm:text-sm">
                            </div>

                            @if (errorMessage) {
                            <p class="text-red-500 text-sm">{{ errorMessage }}</p>
                            }

                            <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-slate-100">
                                <app-button type="submit" [disabled]="isLoading" customClass="w-full">
                                    @if (isLoading) {
                                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                                        fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    } @else {
                                    Entrar
                                    }
                                </app-button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="mt-8 text-center text-sm text-slate-500">
                    Ainda não tem uma conta? <a routerLink="/register"
                        class="font-semibold text-slate-900 hover:text-emerald-600 transition-colors">Criar conta</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center">
        <p class="text-xs text-slate-400">&copy; 2026 Meta Flow. Clareza. Disciplina. Progresso.</p>
    </footer>
</div>
