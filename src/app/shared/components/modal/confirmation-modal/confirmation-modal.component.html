@if (isOpen) {
<div
    class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden animate-in zoom-in-95 duration-200 fill-mode-both"
        (click)="$event.stopPropagation()">

        <div class="p-6">
            <div class="flex items-center justify-center w-12 h-12 rounded-full mb-4 mx-auto"
                [ngClass]="variant === 'danger' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-600'">
                @if (variant === 'danger') {
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                    </path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                } @else {
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                }
            </div>

            <div class="text-center">
                <h3 class="text-lg font-bold text-slate-900 mb-2">{{ title }}</h3>
                <p class="text-slate-500 text-sm mb-6">{{ message }}</p>
            </div>

            <div class="flex flex-col gap-2">
                <app-button [variant]="variant === 'danger' ? 'primary' : 'primary'"
                    [customClass]="variant === 'danger' ? 'w-full !bg-red-600 hover:!bg-red-700' : 'w-full'"
                    (click)="onConfirm()" [disabled]="isLoading">
                    @if (isLoading) {
                    <div class="flex justify-center items-center h-5 w-5">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                    } @else {
                    {{ confirmText }}
                    }
                </app-button>
                <app-button variant="secondary" customClass="w-full" (click)="onCancel()" [disabled]="isLoading">
                    {{ cancelText }}
                </app-button>
            </div>
        </div>
    </div>
</div>
}
